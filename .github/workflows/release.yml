name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for release (optional - uses version from Cargo.toml if not specified)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - name: Checkout codex-acp
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          CARGO_VERSION=$(grep -m1 "^version" Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$CARGO_VERSION"
            TAG_NAME="v$VERSION"
          fi

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ Version mismatch: tag/input implies '$VERSION' but Cargo.toml has '$CARGO_VERSION'"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "❌ Invalid version format: '$VERSION' (expected semver-like)"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  build-linux:
    name: Build Linux Artifact
    needs: get-version
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create archive
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          TARGET="x86_64-unknown-linux-gnu"
          BINARY_NAME="codex-acp"
          ARCHIVE_NAME="codex-acp-cas-${VERSION}-${TARGET}.tar.gz"
          SHA_NAME="${ARCHIVE_NAME}.sha256"

          cp "target/${TARGET}/release/${BINARY_NAME}" .
          tar czf "$ARCHIVE_NAME" "$BINARY_NAME"
          sha256sum "$ARCHIVE_NAME" > "$SHA_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            codex-acp-cas-*.tar.gz
            codex-acp-cas-*.tar.gz.sha256
          retention-days: 1

  create-release:
    name: Create Release
    needs: [get-version, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          name: Release ${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
