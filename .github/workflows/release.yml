name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for release (optional - uses version from Cargo.toml if not specified)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: codex-acp

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        shell: bash
        run: |
          CARGO_VERSION=$(grep -m1 "^version" Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$CARGO_VERSION"
            TAG_NAME="v$VERSION"
          fi

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch: tag/input implies '$VERSION' but Cargo.toml has '$CARGO_VERSION'"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid version format: '$VERSION'"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_path: target/x86_64-unknown-linux-gnu/release/codex-acp
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_path: target/aarch64-apple-darwin/release/codex-acp
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_path: target/x86_64-pc-windows-msvc/release/codex-acp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          BINARY_NAME="${{ env.BINARY_NAME }}"
          ARCHIVE_NAME="${BINARY_NAME}-cas-${VERSION}-${TARGET}.tar.gz"
          SHA_NAME="${ARCHIVE_NAME}.sha256"

          cp "${{ matrix.binary_path }}" "$BINARY_NAME"
          tar czf "$ARCHIVE_NAME" "$BINARY_NAME" README.md LICENSE
          shasum -a 256 "$ARCHIVE_NAME" > "$SHA_NAME"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.get-version.outputs.version }}"
          $target = "${{ matrix.target }}"
          $binaryName = "${{ env.BINARY_NAME }}"
          $archiveName = "$binaryName-cas-$version-$target.zip"
          $shaName = "$archiveName.sha256"

          Copy-Item "${{ matrix.binary_path }}" "$binaryName.exe"
          Compress-Archive -Path "$binaryName.exe", "README.md", "LICENSE" -DestinationPath $archiveName -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archiveName).Hash.ToLowerInvariant()
          "$hash  $archiveName" | Out-File -Encoding ascii $shaName

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          if-no-files-found: error
          path: |
            *.tar.gz
            *.zip
            *.sha256
          retention-days: 1

  package-linux:
    name: Package Linux .deb and .rpm
    needs: get-version
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-x86_64-unknown-linux-gnu

      - name: Install packaging tools
        shell: bash
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build Linux release binary
        run: cargo build --release

      - name: Build .deb package
        shell: bash
        run: cargo deb --no-build

      - name: Build .rpm package
        shell: bash
        run: cargo generate-rpm

      - name: Create package checksums
        shell: bash
        run: |
          find target -type f \( -name "*.deb" -o -name "*.rpm" \) -print0 | while IFS= read -r -d '' file; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-linux
          if-no-files-found: error
          path: |
            target/**/*.deb
            target/**/*.rpm
            target/**/*.deb.sha256
            target/**/*.rpm.sha256
          retention-days: 1

  create-release:
    name: Create Release
    needs: [get-version, build-binaries, package-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Show downloaded artifacts
        shell: bash
        run: find artifacts -maxdepth 4 -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          name: Release ${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
