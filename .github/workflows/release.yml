name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for release (optional - uses version from Cargo.toml if not specified)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: codex-acp

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from Cargo.toml
        id: get_version
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          CARGO_VERSION=$(grep -m1 "^version" Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
          elif [ -n "$INPUT_TAG_NAME" ]; then
            TAG_NAME="$INPUT_TAG_NAME"
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$CARGO_VERSION"
            TAG_NAME="v$VERSION"
          fi

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch: tag/input implies '$VERSION' but Cargo.toml has '$CARGO_VERSION'"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid version format: '$VERSION'"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build-linux-x86_64:
    name: Build Linux x86_64 GNU
    needs: get-version
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux-x86_64-gnu

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Test release target
        run: cargo test --release --target x86_64-unknown-linux-gnu

      - name: Verify installer against release binary
        shell: bash
        run: >-
          ./install.sh
          --from-binary target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}
          --config-home /tmp/codex-acp-release-config
          /tmp/codex-acp-release
          ${{ env.BINARY_NAME }}

      - name: Prepare Linux release files
        shell: bash
        run: |
          release_binary="${BINARY_NAME}-linux-x86_64-gnu"
          cp "target/x86_64-unknown-linux-gnu/release/${BINARY_NAME}" "$release_binary"
          shasum -a 256 "$release_binary" > "$release_binary.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-acp-linux-x86_64-gnu
          if-no-files-found: error
          path: |
            codex-acp-linux-x86_64-gnu
            codex-acp-linux-x86_64-gnu.sha256
          retention-days: 7

  create-release:
    name: Create Release
    needs: [get-version, build-linux-x86_64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded artifacts
        shell: bash
        run: find artifacts -maxdepth 4 -type f | sort

      - name: Prepare installer checksum
        shell: bash
        run: shasum -a 256 install.sh > install.sh.sha256

      - name: Prepare release notes
        shell: bash
        run: |
          notes=".github/releases/${{ needs.get-version.outputs.tag_name }}.md"
          if [ -f "$notes" ]; then
            cp "$notes" release-notes.md
          else
            {
              echo "# codex-acp ${{ needs.get-version.outputs.tag_name }}"
              echo
              echo "See the generated changelog below for commit-level changes."
            } > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: codex-acp v${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            install.sh
            install.sh.sha256
            artifacts/codex-acp-linux-x86_64-gnu/codex-acp-linux-x86_64-gnu
            artifacts/codex-acp-linux-x86_64-gnu/codex-acp-linux-x86_64-gnu.sha256
