name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for release (optional - uses version from Cargo.toml if not specified)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: codex-acp

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from Cargo.toml
        id: get_version
        shell: bash
        run: |
          CARGO_VERSION=$(grep -m1 "^version" Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$CARGO_VERSION"
            TAG_NAME="v$VERSION"
          fi

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch: tag/input implies '$VERSION' but Cargo.toml has '$CARGO_VERSION'"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid version format: '$VERSION'"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/codex-acp
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/codex-acp
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/codex-acp.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Unix release files
        if: runner.os != 'Windows'
        shell: bash
        run: |
          release_binary="${BINARY_NAME}-${{ matrix.artifact_suffix }}"
          cp "${{ matrix.binary_path }}" "$release_binary"
          shasum -a 256 "$release_binary" > "$release_binary.sha256"

      - name: Prepare Windows release files
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseBinary = "${env:BINARY_NAME}-${{ matrix.artifact_suffix }}.exe"
          Copy-Item "${{ matrix.binary_path }}" $releaseBinary
          $hash = (Get-FileHash -Algorithm SHA256 $releaseBinary).Hash.ToLowerInvariant()
          "$hash  $releaseBinary" | Out-File -Encoding ascii "$releaseBinary.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-acp-${{ matrix.artifact_suffix }}
          if-no-files-found: error
          path: |
            codex-acp-${{ matrix.artifact_suffix }}*
          retention-days: 7

  create-release:
    name: Create Release
    needs: [get-version, build-binaries]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded artifacts
        shell: bash
        run: find artifacts -maxdepth 4 -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: codex-acp v${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/codex-acp-*
            artifacts/**/*.sha256
