name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: codex-acp

jobs:
  verify-linux-x86_64:
    name: Verify Linux x86_64 GNU
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-linux-x86_64-gnu

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test release target
        run: cargo test --release --target x86_64-unknown-linux-gnu

      - name: Build release binary for installer smoke test
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Verify install script against artifact
        shell: bash
        run: >-
          ./install.sh
          --from-binary target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }}
          --config-home /tmp/codex-acp-ci-config
          /tmp/codex-acp-ci
          ${{ env.BINARY_NAME }}
