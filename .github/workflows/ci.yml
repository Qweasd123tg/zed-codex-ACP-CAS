name: CI Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: codex-acp

jobs:
  build-release-artifact:
    name: Build release artifact - Linux x86_64 GNU
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare binary artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/${{ env.BINARY_NAME }} dist/${{ env.BINARY_NAME }}-linux-x86_64-gnu

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-acp-linux-x86_64-gnu
          path: dist/${{ env.BINARY_NAME }}-linux-x86_64-gnu
          if-no-files-found: error
          retention-days: 14
